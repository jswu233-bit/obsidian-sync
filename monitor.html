<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoe Runtime Dashboard</title>
  <style>
    :root{--bg:#0b1020;--card:#131a34;--bd:#283863;--txt:#eaf0ff;--muted:#9eabd1;--ok:#50d2a0;--idle:#f5b659}
    body{margin:0;background:radial-gradient(circle at top,#1b2a54,var(--bg));color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    .wrap{max-width:1200px;margin:22px auto;padding:0 16px}
    .top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:12px}
    .sub{color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    .card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:12px}
    .k{font-size:12px;color:var(--muted)} .v{font-size:28px;font-weight:800}
    .agents{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-top:10px}
    .agent h3{margin:0 0 8px;font-size:16px}
    .badge{padding:2px 8px;border-radius:999px;font-size:12px}
    .on{background:#1f4f40;color:#9bf0cc}.off{background:#4b3a1a;color:#ffd89a}
    .list{margin:6px 0 0;padding-left:18px;color:#cfd8ff;font-size:13px}
    .row{display:flex;justify-content:space-between;gap:8px;padding:4px 0;border-bottom:1px dashed #30426f}
    .row:last-child{border-bottom:0}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h2 style="margin:0">🧭 Zoe Runtime Dashboard</h2>
        <div class="sub" id="meta">读取中...</div>
      </div>
      <div class="sub">自动刷新: 10s</div>
    </div>

    <section class="grid" id="summary"></section>
    <section class="agents" id="agents"></section>
    <section class="card" style="margin-top:10px">
      <h3 style="margin:0 0 6px">最近会话</h3>
      <div id="recent"></div>
    </section>
  </div>

<script>
function fmtAgo(ms){if(ms<6e4)return '刚刚';if(ms<36e5)return Math.floor(ms/6e4)+'m';return Math.floor(ms/36e5)+'h'}
function card(k,v){return `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`}
function render(data){
  const recent=data?.sessions?.recent||[];
  const byAgent={};
  for(const s of recent){byAgent[s.agentId]=(byAgent[s.agentId]||0)+1}
  const activeRecent=recent.filter(s=>s.age<30*60*1000).length;
  document.getElementById('meta').textContent=`最后刷新：${new Date(data._generatedAt||Date.now()).toLocaleString()} · sessions:${data?.sessions?.count||0}`;
  document.getElementById('summary').innerHTML=[
    card('总会话数', data?.sessions?.count||0),
    card('近30分钟活跃', activeRecent),
    card('默认模型', data?.sessions?.defaults?.model||'-'),
    card('心跳Agent数', (data?.heartbeat?.agents||[]).filter(a=>a.enabled).length)
  ].join('');

  const agents=['main','spy','joy','ops'];
  document.getElementById('agents').innerHTML=agents.map(a=>{
    const active=(byAgent[a]||0)>0;
    const hb=(data?.heartbeat?.agents||[]).find(x=>x.agentId===a);
    return `<div class="card agent"><h3>${a.toUpperCase()} <span class="badge ${active?'on':'off'}">${active?'活跃':'空闲'}</span></h3>
      <div class="row"><span>最近会话</span><span>${byAgent[a]||0}</span></div>
      <div class="row"><span>心跳</span><span>${hb?.enabled?hb.every:'disabled'}</span></div>
    </div>`
  }).join('');

  document.getElementById('recent').innerHTML=recent.slice(0,10).map(s=>`<div class="row"><span>${s.agentId} · ${s.kind}</span><span>${fmtAgo(s.age||0)} · ${s.percentUsed||'?'}%</span></div>`).join('')||'<div class="sub">暂无</div>';
}
async function load(){
  try{const r=await fetch('/monitor-data.json?'+Date.now());const d=await r.json();render(d);}catch(e){document.getElementById('meta').textContent='读取失败：'+e.message}
}
load();setInterval(load,10000);
</script>
</body>
</html>
