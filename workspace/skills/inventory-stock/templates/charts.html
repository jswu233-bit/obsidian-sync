<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存图表</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1>📦 囤货库存管理</h1>
            <div class="nav-links">
                <a href="/">总览</a>
                <a href="/charts" class="active">图表</a>
                <a href="/report">周报</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="chart-section">
            <h2>分类占比</h2>
            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div class="chart-section">
            <h2>剩余天数 TOP 10</h2>
            <div class="chart-container">
                <canvas id="daysChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // 获取图表数据
        fetch('/api/chart-data')
            .then(response => response.json())
            .then(data => {
                // 分类饼图
                const categoryCtx = document.getElementById('categoryChart').getContext('2d');
                const categoryLabels = Object.keys(data.category_stats);
                const categoryValues = Object.values(data.category_stats);

                new Chart(categoryCtx, {
                    type: 'pie',
                    data: {
                        labels: categoryLabels,
                        datasets: [{
                            data: categoryValues,
                            backgroundColor: [
                                '#FF6384',
                                '#36A2EB',
                                '#FFCE56',
                                '#4BC0C0',
                                '#9966FF'
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });

                // 剩余天数柱状图
                const daysCtx = document.getElementById('daysChart').getContext('2d');
                const itemNames = data.items_with_days.map(item => item.name);
                const daysLeft = data.items_with_days.map(item => item.days_left);

                new Chart(daysCtx, {
                    type: 'bar',
                    data: {
                        labels: itemNames,
                        datasets: [{
                            label: '剩余天数',
                            data: daysLeft,
                            backgroundColor: daysLeft.map(days =>
                                days < 14 ? '#FF6384' : '#36A2EB'
                            )
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: '天数'
                                }
                            }
                        },
                        plugins: {
                            legend: {
                                display: false
                            }
                        }
                    }
                });
            });
    </script>
</body>
</html>
